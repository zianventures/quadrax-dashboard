name: Deploy QuadraX Dashboard

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject Firebase config
        run: |
          sed -i "s|%%FB_API_KEY%%|${{ secrets.FB_API_KEY }}|g"                     index.html
          sed -i "s|%%FB_AUTH_DOMAIN%%|${{ secrets.FB_AUTH_DOMAIN }}|g"             index.html
          sed -i "s|%%FB_PROJECT_ID%%|${{ secrets.FB_PROJECT_ID }}|g"               index.html
          sed -i "s|%%FB_STORAGE_BUCKET%%|${{ secrets.FB_STORAGE_BUCKET }}|g"       index.html
          sed -i "s|%%FB_MESSAGING_SENDER_ID%%|${{ secrets.FB_MESSAGING_SENDER_ID }}|g" index.html
          sed -i "s|%%FB_APP_ID%%|${{ secrets.FB_APP_ID }}|g"                       index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
